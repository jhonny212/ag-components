<div class="card flex justify-center w-full">
  <div
    class="flex w-full"
    [class.top]="labelPosition() === 'top'"
    [class.left]="labelPosition() === 'left'"
    [class.right]="labelPosition() === 'right'"
    [class.bottom]="labelPosition() === 'bottom'"
  >
    @if (label()) {
      <app-input-label
        class="mb-1"
        [label]="label()"
        [field]="field()"
        [icon]="icon()"
        [hasRequired]="hasRequired()"
      />
    }
    <ng-content select="content"> </ng-content>
    @if (help()) {
      <small id="field-help">{{ help() }}</small>
    }
    @if (touched() && invalid() && !hasRequired()) {
      <app-input-errors [errors]="errors()" [hasRequired]="hasRequired()" />
    }
  </div>
</div>
