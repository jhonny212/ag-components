<app-input [label]="label()">
  <content>
    <p-datepicker
      class="ck-date"
      [(ngModel)]="value"
      [showClear]="false"
      appendTo="body"
      (onClear)="handleClear()"
      [selectionMode]="selectionMode()"
      (onSelect)="handleChange($event)"
    >
    </p-datepicker>
  </content>
</app-input>
