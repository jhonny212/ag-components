<app-input
  [errors]="errors()"
  [field]="field()"
  [label]="label()"
  [help]="help()"
  [touched]="touched()"
  [invalid]="invalid()"
  [icon]="icon()"
  [hasRequired]="hasRequired()"
  [showRequired]="showRequired()"
>
  <content>
    <div class="input-file-wrapper" [class.disabled]="disabledComponent()">
      <input
        #fileInput
        type="file"
        [id]="field()"
        [accept]="accept()"
        [multiple]="multiple()"
        [disabled]="disabledComponent()"
        class="hidden-file-input"
        (change)="onFileInputChange($event)"
      />

      <div class="actions">
        <app-button
          [label]="selectButtonLabel()"
          [disable]="disabledComponent()"
          (onClick)="onOpenFilePicker()"
        />

        @if (showUploadButton()) {
          <app-button
            [label]="uploadButtonLabel()"
            [disable]="disabledComponent() || !hasFiles()"
            severity="secondary"
            (onClick)="onRequestUpload()"
          />
        }

        @if (showClearButton()) {
          <app-button
            [label]="clearButtonLabel()"
            [disable]="disabledComponent() || !hasFiles()"
            severity="contrast"
            variant="outline"
            (onClick)="onClearFiles()"
          />
        }
      </div>

      @if (hasFiles()) {
        <ul class="selected-files">
          @for (file of selectedFiles(); track file.name + file.size + file.lastModified) {
            <li>
              <span class="file-name">{{ file.name }}</span>
              <span class="file-meta">({{ file.size }} bytes)</span>
            </li>
          }
        </ul>
      }
    </div>
  </content>
</app-input>
