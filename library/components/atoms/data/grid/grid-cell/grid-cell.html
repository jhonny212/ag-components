<div
  class="item flex justify-between pb-2 pt-2 text-xs sm:text-sm lg:text-base dark:text-ck-neutral-300"
  [class.border-b]="!isLast()"
>
  <p>{{ header() }}</p>
  @if (!isComponent()) {
    <p class="font-bold" [innerHTML]="value()"></p>
  } @else {
    <app-cell-component [column]="column()" [rowValue]="rowValue()" />
  }
</div>
