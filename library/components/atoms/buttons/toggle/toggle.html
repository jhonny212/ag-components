<app-input
  [label]="loading() ? 'Cargando...' : label()"
  [field]="field()"
  [errors]="errors()"
  [help]="help()"
  [touched]="touched()"
  [invalid]="invalid()"
  [hasRequired]="hasRequired()"
  [showRequired]="showRequired()"
>
  <content>
    @if (!loading()) {
      <p-toggleswitch
        [ngModel]="value()"
        (ngModelChange)="onInputChange($event)"
        [disabled]="!!isDisabled()"
      />
    } @else {
      <p-skeleton width="3rem" height="1.5rem" styleClass="rounded-full" />
    }
  </content>
</app-input>
