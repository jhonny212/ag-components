<p-button
  (click)="handleClick($event)"
  [class]="
    customClass() +
    ' ck-button relative overflow-hidden ' +
    'severity-' +
    severity() +
    ' size-' +
    size()
  "
  [severity]="severity()"
  [label]="label()"
  [loading]="loading()"
  [disabled]="disable()"
  [rounded]="rounded()"
  [pTooltip]="tooltip()"
  tooltipPosition="left"
  [tooltipStyleClass]="'tooltip-' + severity()"
>
  <ng-template pTemplate="icon">
    <app-icon-fa [icon]="icon()" [color]="severity()" />
  </ng-template>
</p-button>
