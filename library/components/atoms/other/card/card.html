<div class="content" [class.cursor-pointer]="isClickable()" (click)="handleClick()">
  @if (loading()) {
    <p-skeleton width="100%" />
  } @else {
    <div
      pRipple
      [class]="'ck-card ' + color() + ' ' + customColor()"
      [class.p-ripple-disabled]="!enableRipple()"
    >
      <div class="header">
        <ng-content select="header">
          <div class="title">
            @if (icon()) {
              <app-icon-fa [icon]="icon()" />
            }
            <div>{{ title() }}</div>
          </div>
          <div class="sub-title">{{ subTitle() }}</div>
        </ng-content>
      </div>
      <ng-content select="content"> </ng-content>
    </div>
  }
</div>
