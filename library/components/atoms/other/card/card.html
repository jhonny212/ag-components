<div class="content" [class.cursor-pointer]="isClickable()" (click)="handleClick()">
  @if (loading()) {
    <p-card class="ck-card no-padding">
      <ng-content select="[loading]">
        <p-skeleton width="100%" />
      </ng-content>
    </p-card>
  } @else {
    <p-card
      pRipple
      [class]="'ck-card ' + color() + ' ' + customColor()"
      [header]="cardTitle()"
      [subheader]="subTitle()"
      [class.p-ripple-disabled]="!enableRipple()"
    >
      @if (icon()) {
        <ng-template #header>
          <h2 class="card-title">
            <app-icon-fa [icon]="icon()" />
            {{ title() }}
          </h2>
        </ng-template>
      } @else {
        <ng-content select="header">
          <ng-template #header> </ng-template>
        </ng-content>
      }
      <ng-content select="content"> </ng-content>
    </p-card>
  }
</div>
