<div class="content" [class.cursor-pointer]="isClickable()" (click)="handleClick()">
  <p-card [class]="'ck-card ' + color() + ' ' + customColor()" [header]="cardTitle()" [subheader]="subTitle()">
    @if (icon()) {
      <ng-template #header>
        <h2 class="card-title">
          <fa-icon [icon]="icon()"></fa-icon>
          {{ title() }}
        </h2>
      </ng-template>
    } @else {
      <ng-content select="header">
        <ng-template #header> </ng-template>
      </ng-content>
    }
    <ng-content select="content"> </ng-content>
  </p-card>
</div>
