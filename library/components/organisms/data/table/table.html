<div class="card">
  <p-table
    #dtTable
    stripedRows
    class="ck-table"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
    [globalFilterFields]="['name']"
    [showCurrentPageReport]="true"
    [lazy]="serverSide()"
    [paginator]="hasPagination()"
    [rows]="dataSourceFilter().pagination.pageSize"
    [rowsPerPageOptions]="[5, 10, 20]"
    [totalRecords]="totalRecords()"
    [value]="dataTableData()"
    [loading]="isLoadingData()"
    [selectionMode]="enableRowSelection() ? selectionMode() : undefined"
    [(selection)]="selectedProduct"
    [metaKeySelection]="true"
    paginatorDropdownAppendTo="body"
    paginatorStyleClass="ck-paginator"
    [dataKey]="primaryKey()?.toString()"
    [filterDelay]="0"
    (onPage)="handlePage($event)"
    (onRowSelect)="handleRowSelected($event)"
    (onLazyLoad)="handleLoadData($event)"
    [expandedRowKeys]="expandedRows"
    (onRowExpand)="handleRowExpanded($event)"
    (onRowCollapse)="handleRowCollapsed($event)"
  >
    @if (hasBasicSearch() || enableReload()) {
      <ng-template #caption>
        <div class="toolbar" [class.flex-row-reverse]="enableReload() && !hasBasicSearch()">
          @if (hasBasicSearch()) {
            <div class="max-w-[300px] mr-4 xs:mr-0">
              <app-search-input
                [(value)]="searchTerm"
                [debounceTime]="600"
                [acceptEmptyString]="true"
                (valueChange)="handleSearch($event)"
              />
            </div>
          }
          @if (enableReload()) {
            <app-button
              tooltip="Recargar datos"
              size="small"
              [loading]="!!isLoadingData()"
              [icon]="reloadIcon()"
              [rounded]="true"
              (onClick)="handleReloadData()"
            />
          }
        </div>
      </ng-template>
    }
    <ng-template #header>
      <tr app-table-header [columns]="dataTableColumns()" [actions]="actions()"></tr>
    </ng-template>
    @if (dataTableData().length) {
      <ng-template #body let-product let-expanded="expanded">
        @if (isObjectNotEmpty(product)) {
          <tr
            app-table-row
            [isExpanded]="expanded"
            [expandableRows]="expandableRows()"
            [pSelectableRow]="product"
            [pSelectableRow]="product"
            [columns]="dataTableColumns()"
            [actions]="actions()"
            [actionMode]="dataSourceActionMode()"
            [data]="product"
            (onAction)="handleAction($event)"
          ></tr>
        } @else {
          <!--start: Render empty state when there are no records -->
          <tr>
            @for (item of dataTableColumns(); track $index) {
              <td>&nbsp;</td>
            }
            @if (actions().length) {
              <td>&nbsp;</td>
            }
          </tr>
          <!--end: Render empty state when there are no records -->
        }
      </ng-template>
    }
    <ng-template #emptymessage>
      <tr>
        <td [colSpan]="dataTableColumns().length + (actions().length ? 1 : 0)">
          <app-empty-message
            class="min-h-[300px] flex items-center justify-center"
            title="Datos vacíos"
            [icon]="emptyIcon"
          />
        </td>
      </tr>
    </ng-template>
    <ng-template #expandedrow let-data>
      <ng-container *ngTemplateOutlet="expandedRowTemplate(); context: { $implicit: data }">
      </ng-container>
    </ng-template>
  </p-table>
</div>
