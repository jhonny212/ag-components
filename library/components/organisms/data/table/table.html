<div class="card">
  <p-table
    #dtTable
    stripedRows
    class="ck-table"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
    [globalFilterFields]="['name']"
    [showCurrentPageReport]="true"
    [lazy]="true"
    [sortField]="dataSourceFilter().sortColumn?.toString()"
    [sortOrder]="dataSourceFilter().sortDirection === 'ASC' ? 1 : -1"
    [paginator]="hasPagination()"
    [rows]="dataSourceFilter().pagination.pageSize"
    [rowsPerPageOptions]="[5, 10, 20]"
    [totalRecords]="totalRecords()"
    [value]="dataTableData()"
    [loading]="isLoadingData()"
    [selectionMode]="enableRowSelection() ? selectionMode() : undefined"
    [(selection)]="selectedProduct"
    [metaKeySelection]="true"
    paginatorDropdownAppendTo="body"
    paginatorStyleClass="ck-paginator"
    [dataKey]="primaryKey()?.toString()"
    (onPage)="handlePage($event)"
    (onRowSelect)="handleRowSelected($event)"
    (onLazyLoad)="handleLoadData($event)"
  >
    @if (hasBasicSearch() || enableReload()) {
      <ng-template #caption>
        <div class="toolbar" [class.flex-row-reverse]="enableReload() && !hasBasicSearch()">
          @if (hasBasicSearch()) {
            <div class="max-w-[300px]">
              <app-search-input
                [(value)]="searchTerm"
                [debounceTime]="600"
                (valueChange)="handleSearch()"
              />
            </div>
          }
          @if (enableReload()) {
            <app-button
              tooltip="Recargar datos"
              [loading]="isLoadingData()"
              [icon]="reloadIcon()"
              [rounded]="true"
              (onClick)="handleReloadData()"
            />
          }
        </div>
      </ng-template>
    }
    <ng-template #header>
      <tr app-table-header [columns]="dataSourceConfig().columns" [actions]="actions()"></tr>
    </ng-template>
    @if (dataTableData().length) {
      <ng-template #body let-product>
        @if (isObjectNotEmpty(product)) {
          <tr
            [pSelectableRow]="product"
            app-table-row
            [pSelectableRow]="product"
            [columns]="dataSourceConfig().columns"
            [actions]="actions()"
            [actionMode]="dataSourceActionMode()"
            [data]="product"
            (onAction)="handleAction($event)"
          ></tr>
        } @else {
          <!--start: Render empty state when there are no records -->
          <tr>
            @for (item of dataSourceConfig().columns; track $index) {
              <td>&nbsp;</td>
            }
            @if (actions().length) {
              <td>&nbsp;</td>
            }
          </tr>
          <!--end: Render empty state when there are no records -->
        }
      </ng-template>
    }
    <ng-template #emptymessage>
      <tr>
        <td [colSpan]="dataSourceConfig().columns.length + (actions().length ? 1 : 0)">
          <app-empty-message
            class="min-h-[300px] flex items-center justify-center"
            title="Datos vacíos"
            [icon]="emptyIcon"
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
