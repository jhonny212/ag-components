<div class="view">
  @if (data().length) {
    <div class="toolbar">
      <app-button
        tooltip="Recargar datos"
        [loading]="isLoadingData()"
        [icon]="reloadIcon()"
        [rounded]="true"
        size="small"
        (onClick)="handleReloadData()"
      />
      <app-paginator
        class="grid-paginator"
        pageTemplate="{first} a {last}"
        [first]="first()"
        [rows]="rows()"
        [showPages]="true"
        [showDropdown]="false"
        [totalRecords]="totalRecords()"
        (onPage)="handlePageChange($event)"
      />
    </div>
    @for (item of data(); track $index) {
      <app-grid-card
        class="px-2"
        [selectedItem]="selectedItem()"
        [item]="item"
        [dataSourceConfig]="dataSourceConfig()"
        [actions]="dataSourceActions()"
        (onClick)="handleClick($event)"
        (onAction)="handleAction($event)"
      />
    }
  } @else {
    <app-empty-message [icon]="emptyIcon" title="Sin registros" />
  }
  @if (isLoadingData()) {
    <div class="loader">
      <div class="loader-overlay">
        <div class="loader-content">
          <div class="spinner"></div>
          <span class="spinner-text">Cargando...</span>
        </div>
      </div>
    </div>
  }
</div>
