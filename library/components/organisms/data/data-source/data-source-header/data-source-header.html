<div class="flex flex-col gap-2">
  <div class="title" [class.mb-3]="!subTitle()">
    <span>{{ title() }}</span>
    <div class="view">
      <app-icon-fa
        [class.active]="isTableView()"
        [icon]="tableView"
        (onClick)="handleViewChange(true)"
      />
      <app-icon-fa
        class="cursor-pointer ml-2"
        [class.active]="!isTableView()"
        [icon]="cardView"
        (onClick)="handleViewChange(false)"
      />
    </div>
  </div>
  @if (subTitle()) {
    <p class="subtitle">
      {{ subTitle() }}
    </p>
  }
</div>
