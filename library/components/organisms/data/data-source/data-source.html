@if (!isTableView()) {
  <app-card [isClickable]="false" [enableRipple]="false">
    <header>
      <app-data-source-header
        [title]="title()"
        [subTitle]="subTitle()"
        [(isTableView)]="isTableView"
      />
      <ng-container *ngTemplateOutlet="filtersTpl"></ng-container>
    </header>
    <content>
      <div class="grid-view">
        <app-grid-view
          class="mt-5"
          [(dataSourceFilter)]="dataSourceFilter"
          [data]="dataSourceData()"
          [totalRecords]="totalItems()"
          [actions]="actions()"
          [loading]="isLoadingData()"
          [dataSourceConfig]="dataSourceConfig()"
          (onRowSelected)="handleSelectRow($event)"
          (onLoadData)="handleLoadData($event)"
          (onAction)="handleAction($event)"
          (onCell)="handleCellEvent($event)"
        >
        </app-grid-view>
      </div>
    </content>
  </app-card>
} @else {
  <app-table-card
    [title]="''"
    [subTitle]="''"
    [(dataSourceFilter)]="dataSourceFilter"
    [dataSourceConfig]="dataSourceConfig()"
    [actionMode]="actionMode()"
    [loading]="isLoadingData()"
    [data]="dataSourceData()"
    [totalRecords]="totalItems()"
    [primaryKey]="primaryKey()"
    [actions]="actions()"
    [addEmptyRows]="addEmptyRows()"
    [hasBasicSearch]="hasBasicSearch()"
    [enableRowSelection]="enableRowSelection()"
    (onLoadData)="handleLoadData($event)"
    (onRowSelected)="handleSelectRow($event)"
    (onAction)="handleAction($event)"
    (onCell)="handleCellEvent($event)"
  >
    <header>
      <app-data-source-header
        [title]="title()"
        [subTitle]="subTitle()"
        [(isTableView)]="isTableView"
      />
      <ng-container *ngTemplateOutlet="filtersTpl"></ng-container>
    </header>
  </app-table-card>
}
<ng-template #filtersTpl>
  <ng-content selector="[filters]"></ng-content>
</ng-template>
