<app-card [enableRipple]="true" [class]="severity() + ' ck-card'" [loading]="loading()">
  <header>
    <div class="title">
      @if (icon()) {
        <fa-icon [icon]="icon()"></fa-icon>
      }
      <span>{{ title() }}</span>
    </div>
    @if (subTitle()) {
      <div class="sub-title">{{ subTitle() }}</div>
    }
  </header>
  <content [class]="'content ' + severity()">
    <p class="">{{ info() }}</p>
  </content>
  <div loading>
    <div class="loader">
      <div class="loader-header">
        <app-skeleton-icon />
        <app-skeleton-input />
      </div>
      <app-skeleton-text [paragraphNumber]="2" />
    </div>
  </div>
</app-card>
