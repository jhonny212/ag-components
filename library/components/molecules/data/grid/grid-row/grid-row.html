<div class="content">
  @if (actions().length > 0) {
    <app-data-action
      class="data-action"
      [dotsIcon]="dotsIcon"
      [actions]="actions()"
      [cellEvents]="cellEvents()"
      (onAction)="handleAction($event)"
    />
  }
  @for (item of columns(); track $index; let i = $index) {
    <app-grid-cell [column]="item" [rowValue]="data()" [isLast]="i === columns().length - 1" />
  }
</div>
