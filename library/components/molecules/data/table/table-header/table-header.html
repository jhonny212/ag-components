@for (item of columns(); track $index) {
  <th
    class="ck-table-header"
    [pSortableColumn]="item.header?.sortableField?.toString()"
    [style.width]="item.width"
    [style.min-width]="item.minWidth"
    [class.last-column]="$index === columns().length - 1 && !actions().length"
    [class.first-column]="$index === 0"
  >
    <app-table-header-cell [header]="item" />
  </th>
}

@if (actions().length) {
  <th
    class="ck-table-header"
    [class.last-column]="true"
    [ngStyle]="{
      width: actionMinWidth(),
    }"
  >
    Acciones
  </th>
}
