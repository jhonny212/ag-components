@for (item of columns(); track $index; let start = $first) {
  <td class="row-item" [class.start]="start && expandableRows()">
    @if (expandableRows() && start) {
      <app-icon-fa
        [pRowToggler]="data()"
        size="xs"
        color="primary"
        [enableRipple]="true"
        [icon]="expandedIcon()"
      />
    }
    <app-table-cell
      [column]="item"
      [rowValue]="data()"
      (componentCellEvent)="handleCellEvent($event)"
    />
  </td>
}
@if (actions().length && actionMode() === 'buttons') {
  <td class="actions">
    @for (item of actions(); track $index) {
      <app-button
        [severity]="item.color"
        [rounded]="true"
        [icon]="item.faIcon"
        size="small"
        [loading]="!!actionsEvent().get(item.triggerAction)?.loading()"
        [tooltip]="item.label"
        (onClick)="handleAction(item)"
      />
    }
  </td>
} @else if (actions().length && actionMode() === 'dropdown') {
  <td class="actions-dropdown">
    <div class="content">
      <app-data-action
        [actions]="actions()"
        [cellEvents]="actionsEvent()"
        (onAction)="handleAction($event)"
      />
    </div>
  </td>
}
