<div class="ag-search" (click)="handleClick($event)">
  <p-iconfield iconPosition="right">
    @if (searchIcon) {
      <div class="ag-search-icon" [class.label]="label()">
        <app-icon-fa [icon]="searchIcon" />
      </div>
    }
    <app-input-text
      inputClass="!px-10"
      [placeholder]="placeholder() || 'Buscar'"
      [debounceTime]="debounceTime()"
      [minTextLength]="minTextLength()"
      [acceptEmptyString]="acceptEmptyString()"
      [(value)]="value"
    />
  </p-iconfield>
</div>
